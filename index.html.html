<html lang="id">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Source Sans 3',sans-serif;background:#0f1923;color:#e8ecf1;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#182538}::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:3px}
.fade-in{animation:fadeIn .35s ease-out forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.sidebar{width:256px;min-height:100vh;background:linear-gradient(180deg,#1a2744 0%,#0f1923 100%);border-right:1px solid #2a3f5f;position:fixed;left:0;top:0;z-index:40;transition:transform .3s;overflow-y:auto}
.main-content{margin-left:256px;transition:margin-left .3s}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35;display:none;backdrop-filter:blur(2px)}
.sidebar-overlay.active{display:block}

.nav-header{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#3b4f6e;font-weight:700;margin:18px 18px 6px;padding-left:2px}
.nav-item{padding:10px 18px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:11px;font-size:13px;color:#7a8ba5;user-select:none}
.nav-item:hover{background:rgba(42,63,95,.25);color:#e8ecf1}
.nav-item.active{background:rgba(201,168,76,.07);border-left-color:#c9a84c;color:#c9a84c;font-weight:600}
.nav-item.paj-link{color:#e8a0a0}.nav-item.paj-link:hover{background:rgba(231,76,60,.08);color:#f08080}
.nav-item.paj-link.active{background:rgba(231,76,60,.1);border-left-color:#e74c3c;color:#e74c3c;font-weight:600}

.btn-primary{background:linear-gradient(135deg,#c9a84c,#b8943f);color:#1a2744;font-weight:700;padding:9px 22px;border-radius:7px;border:none;cursor:pointer;transition:all .2s;font-size:13px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(201,168,76,.25)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid #2a3f5f;color:#e8ecf1;padding:8px 14px;border-radius:7px;cursor:pointer;transition:all .15s;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn-secondary:hover{border-color:#c9a84c;color:#c9a84c}
.btn-danger{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.4);color:#ef4444;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:11px;transition:all .15s}
.btn-danger:hover{background:#ef4444;color:white}
.btn-info{background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.4);color:#06b6d4;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s}
.btn-info:hover{background:#06b6d4;color:white}
.btn-paj{background:linear-gradient(135deg,#e74c3c,#c0392b);color:white;font-weight:700;padding:9px 22px;border-radius:7px;border:none;cursor:pointer;transition:all .2s;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn-paj:hover{box-shadow:0 4px 14px rgba(231,76,60,.3);transform:translateY(-1px)}

.input-field{background:#0f1923;border:1px solid #2a3f5f;color:#e8ecf1;padding:9px 13px;border-radius:7px;width:100%;font-size:13px;transition:border-color .15s}
.input-field:focus{outline:none;border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,.12)}
.card{background:#182538;border:1px solid #2a3f5f;border-radius:12px;padding:20px}
.loading-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-radius:50%;border-top-color:#c9a84c;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;top:18px;right:18px;z-index:9999;padding:12px 18px;border-radius:9px;font-size:13px;font-weight:600;animation:slideIn .3s ease;max-width:380px;display:flex;align-items:center;gap:9px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast-success{background:#166534;color:white;border:1px solid #22c55e}
.toast-error{background:#7f1d1d;color:white;border:1px solid #ef4444}
.toast-info{background:#0c4a6e;color:white;border:1px solid #38bdf8}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

.auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 40%,#1a2744 0%,#0f1923 70%);padding:20px}
.auth-box{width:100%;max-width:420px;background:#182538;border:1px solid #2a3f5f;border-radius:14px;padding:36px;box-shadow:0 20px 50px rgba(0,0,0,.5)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.active{display:flex}
.modal-box{background:#182538;width:92%;max-width:620px;border-radius:14px;border:1px solid #2a3f5f;box-shadow:0 0 30px rgba(0,0,0,.5);display:flex;flex-direction:column;max-height:90vh}
.modal-header{padding:16px 20px;border-bottom:1px solid #2a3f5f;display:flex;justify-content:space-between;align-items:center}
.modal-body{padding:20px;overflow-y:auto}
.modal-footer{padding:16px 20px;border-top:1px solid #2a3f5f;display:flex;justify-content:flex-end;gap:8px}

/* KARTU LOGIN */
.kartu-login{width:340px;border:2px solid #1a2744;border-radius:10px;overflow:hidden;font-family:'Times New Roman',Times,serif;background:white;color:#111;page-break-inside:avoid}
.kartu-header{background:#1a2744;color:white;text-align:center;padding:8px 10px;font-size:9pt;font-weight:bold;letter-spacing:.5px}
.kartu-body{padding:10px 12px;display:flex;gap:10px;align-items:center}
.kartu-avatar{width:52px;height:62px;background:#e8ecf1;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid #ccc}
.kartu-avatar i{font-size:28px;color:#1a2744}
.kartu-info{flex:1;font-size:9pt;line-height:1.4}
.kartu-info .nama{font-size:11pt;font-weight:bold;color:#1a2744;margin-bottom:2px}
.kartu-info .nisn{font-family:'Courier New',monospace;font-size:10pt;font-weight:bold;color:#333;letter-spacing:1px}
.kartu-info .kelas{font-size:8.5pt;color:#666;margin-top:1px}
.kartu-barcode{padding:4px 12px 8px;text-align:center;border-top:1px dashed #ccc}
.kartu-barcode svg{max-width:100%;height:38px}
.kartu-barcode .nisn-text{font-family:'Courier New',monospace;font-size:9pt;font-weight:bold;margin-top:2px;letter-spacing:2px}
.kartu-footer{background:#f8f9fa;text-align:center;padding:4px;font-size:6.5pt;color:#999;border-top:1px solid #eee}

/* PREVIEW CETAK */
.print-preview-wrap{background:#d1d5db;padding:30px;border-radius:8px;display:flex;flex-wrap:wrap;gap:16px;justify-content:center;overflow-x:auto}
.print-preview-sheet{background:white;width:210mm;min-height:297mm;padding:1.5cm 1.8cm;box-shadow:0 4px 20px rgba(0,0,0,.15);font-family:'Times New Roman',serif;font-size:11pt;line-height:1.4;color:black}

/* PRINT */
@media print{
    @page{size:A4 portrait;margin:1cm 1.5cm}
    body{background:white!important;color:black!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;font-family:'Times New Roman',Times,serif!important;font-size:11pt}
    #sidebar,.sidebar-overlay,#mainArea>header,.no-print,#toastContainer,.modal-overlay{display:none!important}
    #mainArea{margin:0!important;padding:0!important;width:100%!important;background:white!important;height:auto!important;overflow:visible!important}
    #pageContent{padding:0!important;margin:0!important;overflow:visible!important}
    .print-preview-wrap{background:none!important;padding:0!important;display:block!important}
    .print-preview-sheet{box-shadow:none!important;width:100%!important;padding:0!important;min-height:auto!important}
    .kartu-login{border-color:#000!important}
    .kartu-header{background:#1a2744!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:1023px){
    .sidebar{transform:translateX(-256px)}.sidebar.mobile-open{transform:translateX(0)}.main-content{margin-left:0!important}
}
</style>
</head>
<body>

<div id="toastContainer"></div>

<!-- AUTH -->
<div id="authSection" class="auth-container">
<div id="loginForm" class="auth-box fade-in">
    <div class="text-center mb-6">
        <i class="fas fa-chalkboard-teacher text-4xl text-kopAccent mb-3"></i>
        <h1 class="font-display text-xl font-bold text-light">Panel Guru</h1>
        <p class="text-muted text-sm mt-1">Masukkan NIP dan Password</p>
    </div>
    <div class="space-y-4">
        <div><label class="block text-xs text-muted font-bold mb-1">NIP</label><input type="text" id="loginUsername" class="input-field" placeholder="Masukkan NIP"></div>
        <div><label class="block text-xs text-muted font-bold mb-1">Password</label><input type="password" id="loginPassword" class="input-field" placeholder="Masukkan Password"></div>
        <button onclick="handleLogin()" id="btnLogin" class="btn-primary w-full py-3">MASUK</button>

    <div class="text-center mt-5 border-t border-border pt-4">
        <button onclick="createDemoUser()" class="text-xs text-muted hover:text-kopAccent underline">[Setup] Buat Akun Demo (NIP: 12345)</button>
    </div>
</div>
</div>

<!-- MAIN APP -->
<div id="mainPage" class="hidden">
<div id="sidebarOverlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar" class="sidebar">
    <div class="p-4 border-b border-border">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-kopAccent to-yellow-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-chalkboard-teacher text-kop text-sm"></i></div>
            <div><h2 class="font-display text-kopAccent font-bold text-xs leading-tight">GURU PANEL</h2><p class="text-muted text-[11px]" id="userInfoDisplay">...</p></div>
        </div>
    </div>
    <nav class="py-3" id="sidebarNav">
        <div class="nav-header">Utama</div>
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-th-large w-5 text-center"></i>Dashboard</div>
        <div class="nav-item" data-page="data-siswa"><i class="fas fa-users w-5 text-center"></i>Data Siswa</div>
        <div class="nav-item" data-page="kartu-login"><i class="fas fa-id-card w-5 text-center"></i>Kartu Login Siswa</div>

        <div class="nav-header">Bank Soal SAT</div>
        <div class="nav-item" data-page="bank-sat"><i class="fas fa-book w-5 text-center"></i>Soal SAT</div>
        <div class="nav-item" data-page="token-sat"><i class="fas fa-key w-5 text-center"></i>Token SAT</div>
        <div class="nav-item" data-page="koreksi-sat"><i class="fas fa-check-double w-5 text-center"></i>Koreksi SAT</div>
        <div class="nav-item" data-page="print-sat"><i class="fas fa-print w-5 text-center"></i>Cetak Naskah SAT</div>

        <div class="nav-header" style="color:#e8a0a0">Ujian PAJ (Kls 6)</div>
        <div class="nav-item paj-link" data-page="bank-paj"><i class="fas fa-book-open w-5 text-center"></i>Bank Soal PAJ</div>
        <div class="nav-item paj-link" data-page="token-paj"><i class="fas fa-key w-5 text-center"></i>Token PAJ</div>
        <div class="nav-item paj-link" data-page="koreksi-paj"><i class="fas fa-check-double w-5 text-center"></i>Koreksi & Nilai PAJ</div>
        <div class="nav-item paj-link" data-page="print-paj"><i class="fas fa-print w-5 text-center"></i>Cetak Naskah PAJ</div>
    </nav>
    <div class="absolute bottom-0 left-0 right-0 p-4 border-t border-border">
        <button onclick="handleLogout()" class="btn-secondary w-full text-xs py-2"><i class="fas fa-sign-out-alt mr-1"></i>Keluar</button>
    </div>
</aside>

<div id="mainArea" class="main-content min-h-screen">
    <header class="sticky top-0 z-30 bg-dark/80 backdrop-blur-xl border-b border-border px-4 md:px-6 py-3 flex items-center justify-between no-print">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="text-muted hover:text-light"><i class="fas fa-bars text-lg"></i></button>
            <h2 id="pageTitle" class="font-display text-sm md:text-base font-bold text-light">Dashboard</h2>
        </div>
        <span class="text-[11px] text-kopAccent"><i class="fas fa-wifi mr-1"></i>Live Sync</span>
    </header>
    <div class="p-4 md:p-6" id="pageContent"></div>
</div>
</div>

<!-- MODAL EDIT KUNCI -->
<div id="editKeyModal" class="modal-overlay">
<div class="modal-box">
    <div class="modal-header"><h3 class="font-bold text-light text-sm">Edit Kunci Jawaban</h3><button onclick="closeEditModal()" class="text-muted hover:text-white"><i class="fas fa-times"></i></button></div>

        <p class="text-muted text-xs mb-3">ID: <span id="editKeyId" class="font-mono text-kopAccent"></span></p>
        <div id="editKeyContent" class="bg-dark/30 p-3 rounded text-sm leading-relaxed mb-4 text-light"></div>
        <label class="block text-xs text-muted uppercase mb-2 font-bold">Kunci Jawaban</label>
        <select id="editKeySelect" class="input-field text-lg font-bold text-center"><option value="">-- Pilih --</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option></select>
    </div>
    <div class="modal-footer"><button onclick="closeEditModal()" class="btn-secondary">Batal</button><button onclick="saveEditKey()" class="btn-primary">Simpan</button></div>
</div>
</div>

<script>
// === FIREBASE ===
var firebaseConfig={apiKey:"AIzaSyC0Hs7SUgPAeQ_JaotHUJL5m6nIhCRif-8",authDomain:"pembuatan-soal.firebaseapp.com",projectId:"pembuatan-soal",storageBucket:"pembuatan-soal.firebasestorage.app",messagingSenderId:"56200686194",appId:"1:56200686194:web:eb2de00c9d152d87bcf0eb"};
var db;
try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();db.settings({experimentalAutoDetectLongPolling:true,cacheSizeBytes:firebase.firestore.CACHE_SIZE_UNLIMITED})}catch(e){console.error(e)}

// === MASTER DATA ===
var MAPEL_LIST=[{id:'ppkn',nama:'Pendidikan Pancasila'},{id:'mat',nama:'Matematika'},{id:'bin',nama:'Bahasa Indonesia'},{id:'sbd',nama:'Seni Budaya'},{id:'ipas',nama:'IPAS'},{id:'bsd',nama:'Bahasa Sunda'},{id:'bing',nama:'Bahasa Inggris'},{id:'pai',nama:'PAI'},{id:'pjok',nama:'PJOK'}];
var KELAS_LIST=['Kelas 1','Kelas 2','Kelas 3','Kelas 4','Kelas 5','Kelas 6'];
function getMapelName(id){var m=MAPEL_LIST.find(x=>x.id===id);return m?m.nama:id}
function escHtml(s){if(!s)return '';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

// === STATE ===
var currentUser=null,questions=[],pajQuestions=[],students=[],examTokens=[],results=[];
var currentEditQ=null;

// === TOAST ===
function showToast(msg,type){type=type||'success';var c=document.getElementById('toastContainer');var t=document.createElement('div');var ic=type==='success'?'check-circle':type==='error'?'exclamation-triangle':'info-circle';t.className='toast toast-'+type;t.innerHTML='<i class="fas fa-'+ic+'"></i><span>'+msg+'</span>';c.appendChild(t);setTimeout(()=>{if(t.parentNode)t.remove()},4000)}
function toggleSidebar(){var s=document.getElementById('sidebar');s.classList.toggle('mobile-open');document.getElementById('sidebarOverlay').classList.toggle('active',s.classList.contains('mobile-open'))}

// === AUTH ===
function createDemoUser(){
    showToast('Mengecek database...','info');
    db.collection('teachers').where('nip','==','12345').get().then(snap=>{
        if(!snap.empty){showToast('Sudah ada. Login: NIP 12345, Pass 12345','success');document.getElementById('loginUsername').value='12345';document.getElementById('loginPassword').value='12345';return}
        return db.collection('teachers').add({npsn:'12345678',namaSekolah:'SDN Contoh',namaGuru:'Guru Admin',nip:'12345',jenisGuru:'kelas',kelas:'Kelas 6',password:'12345',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }).then(dr=>{if(dr)showToast('Akun demo dibuat! Silakan login.','success');document.getElementById('loginUsername').value='12345';document.getElementById('loginPassword').value='12345'}).catch(e=>showToast('Error: '+e.message,'error'));
}
function handleLogin(){
    var u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value,btn=document.getElementById('btnLogin');
    if(!u||!p){showToast('Isi NIP dan Password','error');return}
    btn.innerHTML='<span class="loading-spinner mr-2"></span>Proses...';btn.disabled=true;
    db.collection('teachers').get().then(snap=>{
        if(snap.empty){showToast('Database kosong!','error');btn.innerHTML='MASUK';btn.disabled=false;return}
        var found=false;
        snap.forEach(doc=>{var d=doc.data();if(d.nip==u&&d.password==p){found=true;currentUser=Object.assign({id:doc.id},d);loginSuccess()}});
        if(!found){showToast('NIP atau Password salah!','error');btn.innerHTML='MASUK';btn.disabled=false}
    }).catch(e=>{showToast('Koneksi gagal: '+e.message,'error');btn.innerHTML='MASUK';btn.disabled=false});
}
function handleLogout(){currentUser=null;document.getElementById('mainPage').classList.add('hidden');document.getElementById('authSection').classList.remove('hidden')}
function loginSuccess(){document.getElementById('authSection').classList.add('hidden');document.getElementById('mainPage').classList.remove('hidden');document.getElementById('userInfoDisplay').textContent=currentUser.namaGuru||'Guru';showToast('Selamat Datang, '+currentUser.namaGuru);initApp()}

// === FIREBASE LISTENERS ===
function initApp(){
    db.collection('questions').onSnapshot(snap=>{questions=snap.docs.map(d=>Object.assign({id:d.id},d.data()));refreshView()});
    db.collection('questions_paj').onSnapshot(snap=>{pajQuestions=snap.docs.map(d=>Object.assign({id:d.id},d.data()));refreshView()});
    db.collection('students').orderBy('nama','asc').onSnapshot(snap=>{students=snap.docs.map(d=>Object.assign({id:d.id},d.data()));refreshView()});
    db.collection('exam_tokens').onSnapshot(snap=>{examTokens=snap.docs.map(d=>Object.assign({id:d.id},d.data()));refreshView()});
    db.collection('exam_results').onSnapshot(snap=>{results=snap.docs.map(d=>Object.assign({id:d.id},d.data()));refreshView()});
    navigateTo('dashboard');
}
function refreshView(){var p=document.querySelector('.nav-item.active')?.dataset.page;if(!p)return;var c=document.getElementById('pageContent');if(!c)return;
var fn={dashboard:renderDashboard,'data-siswa':renderDataSiswa,'kartu-login':renderKartuLogin,'bank-sat':()=>renderBankSoal(c,false),'bank-paj':()=>renderBankSoal(c,true),'token-sat':()=>renderToken(c,false),'token-paj':()=>renderToken(c,true),'koreksi-sat':()=>renderKoreksi(c,false),'koreksi-paj':()=>renderKoreksi(c,true),'print-sat':()=>renderPrint(c,false),'print-paj':()=>renderPrint(c,true)};
if(fn[p])fn[p]();
}
function navigateTo(page){
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    var t=document.querySelector('.nav-item[data-page="'+page+'"]');if(t)t.classList.add('active');
    var titles={dashboard:'Dashboard','data-siswa':'Data Siswa','kartu-login':'Kartu Login Siswa','bank-sat':'Bank Soal SAT','bank-paj':'Bank Soal PAJ','token-sat':'Token SAT','token-paj':'Token PAJ','koreksi-sat':'Koreksi SAT','koreksi-paj':'Koreksi & Nilai PAJ','print-sat':'Cetak Naskah SAT','print-paj':'Cetak Naskah PAJ'};
    document.getElementById('pageTitle').textContent=titles[page]||page;
    var c=document.getElementById('pageContent');c.dataset.rendered='';refreshView();
}
document.getElementById('sidebarNav').addEventListener('click',e=>{var item=e.target.closest('.nav-item');if(item)navigateTo(item.dataset.page)});

// === DASHBOARD ===
function renderDashboard(c){
    c.innerHTML='<div class="fade-in grid grid-cols-2 lg:grid-cols-4 gap-4">'+
    '<div class="card text-center border-l-4 border-info"><div class="text-3xl font-bold text-info">'+students.length+'</div><div class="text-xs text-muted mt-1">Total Siswa</div></div>'+
    '<div class="card text-center border-l-4 border-kopAccent"><div class="text-3xl font-bold text-kopAccent">'+questions.length+'</div><div class="text-xs text-muted mt-1">Soal SAT</div></div>'+
    '<div class="card text-center border-l-4 border-paj" style="border-color:#e74c3c"><div class="text-3xl font-bold" style="color:#e74c3c">'+pajQuestions.length+'</div><div class="text-xs text-muted mt-1">Soal PAJ</div></div>'+
    '<div class="card text-center border-l-4 border-success"><div class="text-3xl font-bold text-success">'+results.length+'</div><div class="text-xs text-muted mt-1">Hasil Ujian</div></div></div>';
}

// === DATA SISWA ===

function autoFillKeys(isPAJ){if(!confirm('Isi kunci kosong secara ACAK?'))return;var col=isPAJ?'questions_paj':'questions';var ql=isPAJ?pajQuestions:questions;var batch=db.batch();var cnt=0;

if(cnt>0)batch.commit().then(()=>showToast(cnt+' soal diisi kuncinya!','success')).catch(e=>showToast(e.message,'error'));else showToast('Semua sudah ada kunci.','info')}

document.getElementById('editKeyId').innerText=qId;document.getElementById('editKeyContent').innerHTML=escHtml(q.text);document.getElementById('editKeySelect').value=q.correctKey||q.answer||'';document.getElementById('editKeyModal').classList.add('active')}

function loadKorData(isPAJ){var mp=document.getElementById('korMapel')?.value,kl=document.getElementById('korKelas')?.value,ct=document.getElementById('korSiswaList');if(!mp||!kl||!ct)return;

if(!st.length){ct.innerHTML='<p class="text-muted py-4">Tidak ada siswa.</p>';return}
ct.innerHTML=st.map(s=>{var r=res.find(x=>x.siswaId===s.id);
if(!r)return '<div class="flex justify-between items-center p-2 bg-dark/30 rounded"><span class="text-muted">'+s.nama+'</span><span class="text-xs text-muted">Belum Ujian</span></div>';

return '<div class="flex justify-between items-center p-3 bg-dark/30 rounded hover:bg-cardHover cursor-pointer border border-transparent hover:border-border transition" onclick="openCorrectionModal(\''+r.id+'\',\''+escHtml(s.nama).replace(/'/g,"\\'")+'\','+isPAJ+')">'+
'<div><div class="font-bold text-light text-sm">'+s.nama+'</div><div class="text-[11px] text-muted">PG: '+(r.scorePG||0)+(r.scoreEssay!==undefined?' | Essay: '+Math.round(r.scoreEssay):'')+'</div></div>'+

function openCorrectionModal(resultId,siswaNama,isPAJ){var r=results.find(x=>x.id===resultId);if(!r)return;
var ql=isPAJ?pajQuestions:questions;var eq=ql.filter(q=>q.mapel===r.mapel&&q.kelas===r.kelas);
var pg=eq.filter(q=>q.type==='pg');var es=eq.filter(q=>q.type==='uraian');
var h='<div id="correctionModal" class="modal-overlay active"><div class="modal-box"><div class="modal-header"><div><h3 class="font-bold text-light">Koreksi Jawaban</h3><p class="text-xs text-kopAccent mt-1">'+siswaNama+' &mdash; '+getMapelName(r.mapel)+'</p></div><button onclick="document.getElementById(\'correctionModal\').remove()" class="text-muted hover:text-white text-xl"><i class="fas fa-times"></i></button></div><div class="modal-body">';

if(pg.length){h+='<h4 class="font-bold text-kopAccent text-sm mb-3 pb-1 border-b border-border">I. Pilihan Ganda</h4><div class="space-y-3">';
pg.forEach((q,i)=>{var ans=r.answers?r.answers[q.id]:null;var ck=(q.correctKey||q.answer)?(q.correctKey||q.answer).toString().toUpperCase():'';var ok=ck&&ans&&ck===ans.toString().toUpperCase();
var sb=ok?'<span class="bg-success/20 text-success text-[10px] px-2 py-0.5 rounded font-bold">BENAR</span>':'<span class="bg-danger/20 text-danger text-[10px] px-2 py-0.5 rounded font-bold">SALAH</span>';
var kd=ck?'<span class="text-kopAccent font-bold text-xs ml-2">[Kunci: '+ck+']</span>':'<span class="text-danger text-[10px] ml-2">[Tanpa Kunci]</span>';
var ac=ok?'text-success font-bold':(ans?'text-danger':'text-muted');
h+='<div class="bg-dark/30 p-3 rounded border border-border"><div class="flex justify-between items-center mb-1"><span class="text-[10px] text-muted">No.'+(i+1)+'</span>'+sb+'</div><p class="text-sm text-light font-medium mb-2">'+escHtml(q.text)+'</p><div class="bg-black/20 p-2 rounded text-xs font-mono flex justify-between items-center"><span>Jawaban: <span class="'+ac+' text-sm">'+(ans||'-')+'</span></span>'+kd+'</div></div>'});
h+='</div>'}

if(es.length){h+='<h4 class="font-bold text-kopAccent text-sm mb-3 mt-5 pb-1 border-b border-border">II. Uraian</h4><div class="space-y-4">';
es.forEach((q,i)=>{var ans=r.answers?r.answers[q.id]:'';var sk='scoreEssay_'+q.id;var sv=(r.scoresEssay&&r.scoresEssay[sk])?r.scoresEssay[sk]:'';
var kunciU=(q.correctKey||q.answer)?escHtml(q.correctKey||q.answer):'';var kdU=kunciU?'<div class="mt-2 p-2 bg-kopAccent/10 border border-kopAccent/30 rounded text-xs text-kopAccent"><i class="fas fa-key mr-1"></i><strong>Pedoman:</strong> '+kunciU+'</div>':'';
h+='<div class="bg-dark/30 p-3 rounded border border-border"><div class="flex justify-between mb-1"><span class="text-[10px] text-muted">No.'+(i+1)+' (Max: '+(q.score||1)+')</span></div><p class="text-sm text-light font-bold mb-2">'+escHtml(q.text)+'</p><div class="bg-black/20 p-2 rounded text-xs text-muted italic mb-2">Jawaban:<br>'+escHtml(ans)+'</div>'+kdU+'<div class="flex items-center gap-2 mt-2"><label class="text-xs w-14 font-bold">Nilai:</label><input type="number" id="inputEssay_'+i+'" class="input-field w-24" value="'+sv+'"><span class="text-xs text-muted">/ '+(q.score||1)+'</span></div></div>'});
h+='</div>'}

h+='</div><div class="modal-footer"><button onclick="document.getElementById(\'correctionModal\').remove()" class="btn-secondary">Tutup</button><button onclick="saveCorrection(\''+resultId+'\','+isPAJ+')" class="btn-primary">Simpan Nilai</button></div></div></div>';
var d=document.createElement('div');d.innerHTML=h;document.body.appendChild(d.firstElementChild)}

function saveCorrection(resultId,isPAJ){var r=results.find(x=>x.id===resultId);if(!r)return;
var ql=isPAJ?pajQuestions:questions;var eq=ql.filter(q=>q.mapel===r.mapel&&q.kelas===r.kelas);var es=eq.filter(q=>q.type==='uraian');
var se={},te=0,me=0;
if(es.length){es.forEach((q,i)=>{var inp=document.getElementById('inputEssay_'+i);if(inp){var v=parseFloat(inp.value)||0,mx=q.score||1;if(v>mx)v=mx;if(v<0)v=0;se['scoreEssay_'+q.id]=v;te+=v;me+=mx}})}
var pg=r.scorePG||0;var ef=me>0?(te/me*100):0;var fs=pg;if(es.length>0)fs=Math.round((pg+ef)/2);
db.collection('exam_results').doc(resultId).update({scoresEssay:se,scoreEssay:ef,finalScore:fs,predikat:fs>=70?'TUNTAS':'REMEDIAL'}).then(()=>{showToast('Nilai tersimpan!');document.getElementById('correctionModal').remove();loadKorData(isPAJ)}).catch(e=>showToast(e.message,'error'))}

function printNilai(isPAJ){var mp=document.getElementById('korMapel')?.value,kl=document.getElementById('korKelas')?.value;if(!mp||!kl){showToast('Pilih filter dulu','error');return}
var st=students.filter(s=>s.kelas===kl);var res=results.filter(r=>r.mapel===mp&&r.kelas===kl&&r.isPAJ===isPAJ);
var h='<div style="font-family:Times New Roman;padding:10px"><h3 style="text-align:center;text-decoration:underline">LAPORAN HASIL UJIAN</h3><p style="text-align:center">'+getMapelName(mp)+' - '+kl+'</p><br><table style="width:100%;border-collapse:collapse;font-size:11pt"><thead><tr><th style="border:1px solid #000;padding:4px;width:30px">No</th><th style="border:1px solid #000;padding:4px;text-align:left">Nama Siswa</th><th style="border:1px solid #000;padding:4px;width:60px">NISN</th><th style="border:1px solid #000;padding:4px;width:50px">PG</th><th style="border:1px solid #000;padding:4px;width:50px">Essay</th><th style="border:1px solid #000;padding:4px;width:60px">Akhir</th><th style="border:1px solid #000;padding:4px;width:70px">Ket</th></tr></thead><tbody>';
st.forEach((s,i)=>{var r=res.find(x=>x.siswaId===s.id);var pg=0,es=0,fs=0,ket='BELUM UJIAN';
if(r){pg=r.scorePG||0;es=r.scoreEssay!==undefined?Math.round(r.scoreEssay):'-';fs=r.finalScore!==undefined?r.finalScore:pg;ket=fs>=70?'<span style="color:green;font-weight:bold">TUNTAS</span>':'<span style="color:red;font-weight:bold">REMEDIAL</span>'}
h+='<tr><td style="text-align:center;border:1px solid #000;padding:3px">'+(i+1)+'</td><td style="border:1px solid #000;padding:3px">'+s.nama+'</td><td style="text-align:center;border:1px solid #000;padding:3px;font-family:Courier New">'+s.nisn+'</td><td style="text-align:center;border:1px solid #000;padding:3px">'+pg+'</td><td style="text-align:center;border:1px solid #000;padding:3px">'+es+'</td><td style="text-align:center;font-weight:bold;border:1px solid #000;padding:3px">'+fs+'</td><td style="text-align:center;border:1px solid #000;padding:3px">'+ket+'</td></tr>'});
h+='</tbody></table></div>';var w=window.open('','','width=900,height=700');w.document.write('<html><head><title>Nilai</title><style>@page{margin:1cm}body{font-family:sans-serif}</style></head><body onload="window.print();window.close()">');w.document.write(h);w.document.write('</body></html>');w.document.close()}

// === CETAK SOAL ===
function renderPrint(c,isPAJ){var key=isPAJ?'print-paj':'print-sat';if(c.dataset.rendered===key)return;
c.innerHTML='<div class="fade-in no-print"><div class="card mb-5"><h3 class="font-bold text-light mb-4"><i class="fas fa-print mr-2 text-kopAccent"></i>Cetak Naskah '+(isPAJ?'PAJ':'SAT')+'</h3>'+
'<div class="flex flex-wrap gap-3 mb-4">'+
'<select id="prMapel" class="input-field w-48" onchange="refreshPrintPreview('+isPAJ+')"><option value="">Pilih Mapel</option>'+MAPEL_LIST.map(m=>'<option value="'+m.id+'">'+m.nama+'</option>').join('')+'</select>'+
'<select id="prKelas" class="input-field w-48" onchange="refreshPrintPreview('+isPAJ+')"><option value="">Pilih Kelas</option>'+KELAS_LIST.map(k=>'<option value="'+k+'">'+k+'</option>').join('')+'</select>'+
'<button onclick="doPrintSoal()" class="btn-primary"><i class="fas fa-print"></i>Cetak / PDF</button></div></div>'+
'<div id="printPreviewContainer" class="print-preview-wrap"><div class="print-preview-sheet text-center p-10 text-gray-400">Pilih Mapel & Kelas...</div></div></div>';
c.dataset.rendered=key}

function refreshPrintPreview(isPAJ){var mp=document.getElementById('prMapel')?.value,kl=document.getElementById('prKelas')?.value,ct=document.getElementById('printPreviewContainer');
if(!mp||!kl){ct.innerHTML='<div class="print-preview-sheet text-center p-10 text-gray-400">Pilih Mapel & Kelas...</div>';return}
var ql=isPAJ?pajQuestions:questions;var data=ql.filter(q=>q.mapel===mp&&q.kelas===kl);
if(!data.length){ct.innerHTML='<div class="print-preview-sheet text-center p-10 font-bold" style="color:#e74c3c">TIDAK ADA SOAL</div>';return}
var pg=data.filter(q=>q.type==='pg'),ur=data.filter(q=>q.type==='uraian');
var logo='https://www.image2url.com/r2/default/images/1776680731558-aaedfd5c-6674-4989-a7a4-c15f6291acac.jpeg';
var h='<div class="print-preview-sheet"><div style="text-align:center;padding-bottom:10px;margin-bottom:20px;border-bottom:3px double #000;display:flex;align-items:center;justify-content:center;gap:14px"><img src="'+logo+'" style="height:70px" alt="Logo"><div style="text-align:center;line-height:1.2"><div style="font-size:12pt;font-weight:bold;text-transform:uppercase">Pemerintah Kabupaten Majalengka</div><div style="font-size:12pt;font-weight:bold;text-transform:uppercase">Dinas Pendidikan</div><div style="font-size:15pt;font-weight:bold;text-transform:uppercase">Korek Api Kecamatan Majalengka</div></div></div>';
h+='<div style="text-align:center;margin-bottom:18px"><h3 style="font-size:13pt;font-weight:bold;text-decoration:underline;text-transform:uppercase">'+(isPAJ?'Penilaian Akhir Jenjang (PAJ)':'Sumatif Akhir Tahun')+'</h3><p style="font-size:12pt">'+getMapelName(mp)+'</p></div>';
if(pg.length){h+='<div style="font-weight:bold;font-size:11pt;border-bottom:2px solid #000;padding-bottom:3px;margin-bottom:12px">I. Pilihan Ganda</div>';
pg.forEach((q,i)=>{h+='<div style="margin-bottom:20px;overflow:hidden"><div style="float:left;font-weight:bold;width:30px">'+(i+1)+'.</div><div style="margin-left:30px;font-size:11pt;line-height:1.4">'+escHtml(q.text)+'</div><div style="margin-left:30px;margin-top:6px;display:grid;grid-template-columns:1fr 1fr;column-gap:20px;row-gap:4px">';
(q.options||[]).forEach((o,oi)=>{h+='<div style="display:flex;gap:6px;font-size:11pt"><span style="font-weight:bold;min-width:18px">'+['a','b','c','d','e'][oi]+'.</span><span>'+escHtml(o)+'</span></div>'});h+='</div><div style="clear:both"></div></div>'})}
if(ur.length){h+='<div style="font-weight:bold;font-size:11pt;border-bottom:2px solid #000;padding-bottom:3px;margin-bottom:12px;margin-top:24px">II. Uraian</div>';
ur.forEach((q,i)=>{h+='<div style="margin-bottom:20px;overflow:hidden"><div style="float:left;font-weight:bold;width:30px">'+(i+1)+'.</div><div style="margin-left:30px;font-size:11pt;line-height:1.4">'+escHtml(q.text)+'</div><div style="margin-left:30px;margin-top:6px;border:1px dashed #bbb;height:70px;background:#fafafa;border-radius:3px"></div><div style="clear:both"></div></div>'})}
h+='</div>';ct.innerHTML=h}

function doPrintSoal(){var sheet=document.querySelector('.print-preview-sheet');if(!sheet)return;
var iframe=document.createElement('iframe');iframe.style.position='fixed';iframe.style.left='-9999px';document.body.appendChild(iframe);
var doc=iframe.contentDocument||iframe.contentWindow.document;doc.open();
doc.write('<!DOCTYPE html><html><head><title>Cetak Soal</title><style>@page{size:A4 portrait;margin:1.5cm 2cm 2cm}body{margin:0;font-family:"Times New Roman",serif;font-size:12pt;line-height:1.4;color:#000;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}</style></head><body>');
doc.write(sheet.innerHTML);doc.write('</body></html>');doc.close();
setTimeout(()=>{iframe.contentWindow.focus();iframe.contentWindow.print();setTimeout(()=>{document.body.removeChild(iframe)},3000)},500)}
</script>
